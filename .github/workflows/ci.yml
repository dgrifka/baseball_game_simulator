name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        # tests/ covers the venue-id regression, an import-smoke over every
        # module the daily bake depends on, and asset-presence for the model
        # CSVs. This is what would have caught the best_batted_balls import break.
        run: pytest tests/ -q
